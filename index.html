<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RateFinder</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  padding:30px;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:16px;
  width:420px;
}

h2{
  margin-top:0;
}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:8px;
}

.result{
  margin-top:15px;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  white-space:pre-line;
}

canvas{
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<h2>💰 RateFinder</h2>

<input id="job" placeholder="job (dev, vet, designer)"/>

<select id="level">
<option value="junior">Junior</option>
<option value="mid">Mid</option>
<option value="senior">Senior</option>
</select>

<input id="country" placeholder="US, CA, CL, EU"/>

<button onclick="calc()">Calcular</button>

<div id="result" class="result"></div>

<canvas id="chart"></canvas>

</div>

<script>

let chart;

async function calc(){

const job=document.getElementById("job").value.trim().toLowerCase();
const level=document.getElementById("level").value;
const country=document.getElementById("country").value.trim().toUpperCase();

const result=document.getElementById("result");

if(!job || !country){
  result.innerText="Completa todos los campos";
  return;
}

try{

const url=`https://ratefinder.onrender.com/rate?job=${job}&level=${level}&country=${country}`;

const res=await fetch(url);
const data=await res.json();

const min=data.min;
const max=data.max;
const mid=(min+max)/2;

result.innerText =
`${job} | ${level} | ${country}\n\n💰 ${min} - ${max} USD`;

draw(min, mid, max);

}catch(e){
console.log(e);
result.innerText="Error de servidor";
}

}

function draw(min, mid, max){

if(chart) chart.destroy();

const ctx=document.getElementById("chart");

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Min","Mid","Max"],
datasets:[{
data:[min, mid, max]
}]
},
options:{
plugins:{legend:{display:false}}
}
});

}

</script>

</body>
</html>
