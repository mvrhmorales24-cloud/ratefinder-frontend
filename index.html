<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RateFinder</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .card {
    background: #1e293b;
    padding: 30px;
    border-radius: 16px;
    width: 360px;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 10px;
  }

  .lang {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .lang button {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: #334155;
    color: white;
    cursor: pointer;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  button:disabled {
    background: #64748b;
  }

  .result {
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 10px;
    min-height: 60px;
    white-space: pre-line;
  }
</style>
</head>

<body>

<div class="card">

  <div class="lang">
    <button onclick="setLang('es')">ES</button>
    <button onclick="setLang('en')">EN</button>
  </div>

  <h1 id="title">💰 RateFinder</h1>

  <input id="job" placeholder="Job / Trabajo" />

  <select id="level">
    <option value="junior">Junior</option>
    <option value="mid">Mid</option>
    <option value="senior">Senior</option>
  </select>

  <input id="country" placeholder="Country / País" />

  <button id="btn" onclick="calculate()">Calcular</button>

  <div id="result" class="result"></div>
</div>

<script>
let lang = "es";

function setLang(l) {
  lang = l;

  document.getElementById("title").innerText =
    l === "es" ? "💰 RateFinder" : "💰 RateFinder";

  document.getElementById("btn").innerText =
    l === "es" ? "Calcular" : "Calculate";

  document.getElementById("job").placeholder =
    l === "es" ? "Trabajo (dev, designer)" : "Job (dev, designer)";

  document.getElementById("country").placeholder =
    l === "es" ? "País (CL, US, CA)" : "Country (CL, US, CA)";
}

async function calculate() {
  const btn = document.getElementById("btn");
  const result = document.getElementById("result");

  const job = document.getElementById("job").value.trim();
  const level = document.getElementById("level").value;
  const country = document.getElementById("country").value.trim();

  if (!job || !country) {
    result.innerText =
      lang === "es"
        ? "⚠️ Completa todos los campos"
        : "⚠️ Fill all fields";
    return;
  }

  btn.disabled = true;
  btn.innerText = lang === "es" ? "Calculando..." : "Calculating...";
  result.innerText = "Loading...";

  try {
    const url =
      "https://ratefinder.onrender.com/rate" +
      "?job=" + encodeURIComponent(job) +
      "&level=" + encodeURIComponent(level) +
      "&country=" + encodeURIComponent(country);

    const response = await fetch(url, { cache: "no-store" });

    if (!response.ok) {
      throw new Error("Server error " + response.status);
    }

    const data = await response.json();

    // ✔ validación segura (FIX REAL)
    if (
      data.min === undefined ||
      data.max === undefined ||
      isNaN(data.min) ||
      isNaN(data.max)
    ) {
      throw new Error("Invalid backend data");
    }

    result.innerText =
      lang === "es"
        ? `💰 Rango salarial\n\n$${data.min} - $${data.max}\n\n📍 ${data.country.toUpperCase()}`
        : `💰 Salary range\n\n$${data.min} - $${data.max}\n\n📍 ${data.country.toUpperCase()}`;

  } catch (err) {
    console.log(err);

    result.innerText =
      lang === "es"
        ? "❌ Error del servidor o sin datos"
        : "❌ Server error or no data";
  }

  btn.disabled = false;
  btn.innerText = lang === "es" ? "Calcular" : "Calculate";
}
</script>

</body>
</html>
