<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RateFinder</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .card {
    background: #1e293b;
    padding: 30px;
    border-radius: 16px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  h1 {
    margin-bottom: 20px;
    font-size: 24px;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  button:disabled {
    background: #64748b;
  }

  .result {
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 10px;
    font-size: 16px;
    white-space: pre-line;
  }

  .label {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 5px;
  }
</style>
</head>

<body>

<div class="card">
  <h1>💰 RateFinder</h1>

  <input id="job" placeholder="Job (dev, designer, vet)" />
  <div class="label">Try: dev, developer, UX</div>

  <select id="level">
    <option value="junior">Junior</option>
    <option value="mid">Mid</option>
    <option value="senior">Senior</option>
  </select>

  <input id="country" placeholder="Country (CL, US)" />
  <div class="label">Try: CL, US</div>

  <button id="calculateBtn" onclick="calculate()">Calculate</button>

  <div id="result" class="result"></div>
</div>

<script>
async function calculate() {
  const btn = document.getElementById("calculateBtn");
  const result = document.getElementById("result");

  const job = document.getElementById("job").value;
  const level = document.getElementById("level").value;
  const country = document.getElementById("country").value;

  btn.disabled = true;
  btn.innerText = "Calculating...";
  
  result.innerHTML = `
  <div style="opacity:0.7">🔄 Calculating salary range...</div>
  `;

  try {
    const response = await fetch(
      "https://ratefinder.onrender.com/rate?job=" +
      job + "&level=" + level + "&country=" + country
    );

    const data = await response.json();

    // animación simple de aparición
    result.style.opacity = 0;
    setTimeout(() => {
      result.innerHTML = `
        <div style="font-size:18px; margin-bottom:10px;">💰 Estimated Salary</div>
        <div style="font-size:22px; font-weight:bold;">
          $${data.min} - $${data.max}
        </div>
        <div style="margin-top:10px; opacity:0.7">
          📍 ${data.country} | ${data.job} | ${data.level}
        </div>
      `;
      result.style.opacity = 1;
    }, 200);

  } catch (err) {
    result.innerText = "Error connecting to backend";
  }

  btn.disabled = false;
  btn.innerText = "Calculate";
}
</script>
