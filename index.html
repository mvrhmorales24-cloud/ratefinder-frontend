<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RateFinder</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  padding:30px;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:16px;
  width:420px;
}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:8px;
}

.lang{
  display:flex;
  gap:10px;
}

.lang button{
  flex:1;
  background:#334155;
}

.result{
  margin-top:15px;
  white-space:pre-line;
}

canvas{
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<div class="lang">
<button onclick="setLang('es')">ES</button>
<button onclick="setLang('en')">EN</button>
</div>

<h2>💰 RateFinder</h2>

<input id="job" placeholder="job"/>
<select id="level">
<option value="junior">Junior</option>
<option value="mid">Mid</option>
<option value="senior">Senior</option>
</select>

<input id="country" placeholder="US / CL / CA"/>

<button onclick="calc()">Calcular</button>

<div id="result" class="result"></div>

<canvas id="chart"></canvas>

</div>

<script>

let lang="es";
let chart;

function setLang(l){
lang=l;
}

const FX = {
  US: 1,
  CL: 950,
  CA: 1.35
};

async function calc(){

const job=document.getElementById("job").value.trim().toLowerCase();
const level=document.getElementById("level").value;
const country=document.getElementById("country").value.trim().toUpperCase();

const resDiv=document.getElementById("result");

try{

const url=`https://ratefinder.onrender.com/rate?job=${job}&level=${level}&country=${country}`;

const res=await fetch(url);
const data=await res.json();

const fx = FX[country] || 1;

const min = data.min_usd * fx;
const max = data.max_usd * fx;
const mid = (min + max)/2;

resDiv.innerText =
`${job} | ${level}\n\n${Math.round(min)} - ${Math.round(max)} ${country}`;

draw(min, mid, max);

}catch(e){
console.log(e);
resDiv.innerText="error";
}

}

function draw(min, mid, max){

if(chart) chart.destroy();

const ctx=document.getElementById("chart");

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Min","Mid","Max"],
datasets:[{
data:[min,mid,max]
}]
}
});

}

</script>

</body>
</html>
</html>
