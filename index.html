<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RateFinder</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .card {
    background: #1e293b;
    padding: 30px;
    border-radius: 16px;
    width: 380px;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
  }

  .result {
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 10px;
  }

  canvas {
    margin-top: 15px;
  }
</style>
</head>

<body>

<div class="card">
  <h1>💰 RateFinder</h1>

  <input id="job" placeholder="Job (dev, designer, vet)" />

  <select id="level">
    <option value="junior">Junior</option>
    <option value="mid">Mid</option>
    <option value="senior">Senior</option>
  </select>

  <input id="country" placeholder="Country (CL, US, CA, UK)" />

  <button id="calculateBtn" onclick="calculate()">Calculate</button>

  <div id="result" class="result"></div>

  <canvas id="salaryChart"></canvas>
</div>

<script>
async function calculate() {
  const btn = document.getElementById("calculateBtn");
  const result = document.getElementById("result");

  const job = document.getElementById("job").value;
  const level = document.getElementById("level").value;
  const country = document.getElementById("country").value;

  btn.disabled = true;
  btn.innerText = "Calculating...";
  result.innerText = "Loading...";

  try {
    const response = await fetch(
      "https://ratefinder.onrender.com/rate?job=" +
      job + "&level=" + level + "&country=" + country
    );

    const data = await response.json();

    result.innerHTML = `
      <div style="font-size:18px;">💰 Salary</div>
      <div style="font-size:24px; font-weight:bold;">
        ${data.currency} ${data.min} - ${data.max}
      </div>
      <div style="opacity:0.7; margin-top:5px;">
        ${data.country} | ${data.job} | ${data.level}
      </div>
    `;

    drawChart(data.min, data.max);

  } catch (err) {
    result.innerText = "Error connecting to backend";
  }

  btn.disabled = false;
  btn.innerText = "Calculate";
}

function drawChart(min, max) {
  const ctx = document.getElementById("salaryChart");

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ["Min", "Max"],
      datasets: [{
        label: "Salary",
        data: [min, max]
      }]
    }
  });
}
</script>

</body>
</html>
