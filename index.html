<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RateFinder</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .card {
    background: #1e293b;
    padding: 30px;
    border-radius: 16px;
    width: 360px;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 10px;
  }

  .lang {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .lang button {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: #334155;
    color: white;
    cursor: pointer;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  button:disabled {
    background: #64748b;
  }

  .result {
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 10px;
    min-height: 60px;
    white-space: pre-line;
  }
</style>
</head>

<body>

<div class="card">

  <h1>💰 RateFinder</h1>

  <input id="job" placeholder="Job (dev, designer, vet)" />

  <select id="level">
    <option value="junior">Junior</option>
    <option value="mid">Mid</option>
    <option value="senior">Senior</option>
  </select>

  <input id="country" placeholder="Country (CL, US, CA)" />

  <button id="btn" onclick="calculate()">Calculate</button>

  <div id="result" class="result"></div>
</div>

<script>

async function calculate() {
  const btn = document.getElementById("btn");
  const result = document.getElementById("result");

  const job = document.getElementById("job").value.trim().toLowerCase();
  const level = document.getElementById("level").value;
  const country = document.getElementById("country").value.trim();

  if (!job || !country) {
    result.innerText = "⚠️ Fill all fields";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Calculating...";
  result.innerText = "Loading...";

  try {
    const url =
      "https://ratefinder.onrender.com/rate" +
      "?job=" + encodeURIComponent(job) +
      "&level=" + encodeURIComponent(level) +
      "&country=" + encodeURIComponent(country);

    const response = await fetch(url, { cache: "no-store" });

    if (!response.ok) {
      throw new Error("Server error " + response.status);
    }

    const data = await response.json();

    // ✔ VALIDACIÓN FINAL SEGURA
    if (
      data.min === undefined ||
      data.max === undefined ||
      isNaN(Number(data.min)) ||
      isNaN(Number(data.max))
    ) {
      throw new Error("Invalid backend response");
    }

    result.innerText =
      "💰 Salary range\n\n" +
      "$" + data.min + " - $" + data.max + "\n\n" +
      "📍 " + data.country.toUpperCase() +
      " | " + data.job +
      " | " + data.level;

  } catch (err) {
    console.log(err);
    result.innerText = "❌ Server error or no data";
  }

  btn.disabled = false;
  btn.innerText = "Calculate";
}

</script>

</body>
</html>
