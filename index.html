<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RateFinder</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:#1e293b;
  padding:30px;
  border-radius:16px;
  width:360px;
}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.result{
  margin-top:20px;
  background:#0f172a;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="card">

<h1>💰 RateFinder</h1>

<input id="job" placeholder="job (dev, designer, vet)"/>

<select id="level">
<option value="junior">Junior</option>
<option value="mid">Mid</option>
<option value="senior">Senior</option>
</select>

<input id="country" placeholder="Country (US, CL, CA)"/>

<button onclick="calc()">Calculate</button>

<div id="result" class="result"></div>

</div>

<script>

async function calc(){

const job=document.getElementById("job").value.trim().toLowerCase();
const level=document.getElementById("level").value;
const country=document.getElementById("country").value.trim().toUpperCase();

const result=document.getElementById("result");

if(!job||!country){
  result.innerText="fill fields";
  return;
}

try{

const url=`https://ratefinder.onrender.com/rate?job=${job}&level=${level}&country=${country}`;

const res=await fetch(url);
const data=await res.json();

const min=data.min_usd*data.currency;
const max=data.max_usd*data.currency;

result.innerText=
`💰 Salary range\n\n${Math.round(min)} - ${Math.round(max)} ${country}\n\n${job} | ${level}`;

}catch(e){
console.log(e);
result.innerText="error";
}

}

</script>

</body>
</html>
