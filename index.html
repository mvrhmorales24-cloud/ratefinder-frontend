<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RateFinder</title>
  <style>
    body {
      font-family: Arial;
      padding: 40px;
    }

    input, select, button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      font-size: 16px;
    }

    button {
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      white-space: pre-line;
    }
  </style>
</head>

<body>

  <h1>RateFinder</h1>

  <input id="job" placeholder="Job (design, developer, vet)" />

  <select id="level">
    <option value="junior">Junior</option>
    <option value="mid">Mid</option>
    <option value="senior">Senior</option>
  </select>

  <input id="country" placeholder="Country (CL, US)" />

  <button id="calculateBtn" onclick="calculate()">
    Calculate
  </button>

  <div id="result"></div>

  <script>
    async function calculate() {
      const btn = document.getElementById("calculateBtn");
      const result = document.getElementById("result");

      const job = document.getElementById("job").value;
      const level = document.getElementById("level").value;
      const country = document.getElementById("country").value;

      // UI loading
      btn.disabled = true;
      btn.innerText = "Calculating...";
      result.innerText = "Calculating...";

      try {
        const response = await fetch(
          "https://ratefinder.onrender.com/rate?job=" +
          job +
          "&level=" +
          level +
          "&country=" +
          country
        );

        const data = await response.json();

        // FIX IMPORTANTE: usar min y max (NO price)
        result.innerText =
          "You should charge:\n$" +
          data.min +
          " - $" +
          data.max;

      } catch (error) {
        result.innerText =
          "Error connecting to backend. Try again.";

      } finally {
        btn.disabled = false;
        btn.innerText = "Calculate";
      }
    }
  </script>

</body>
</html>
