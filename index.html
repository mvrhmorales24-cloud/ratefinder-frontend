<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RateFinder</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  padding:30px;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:16px;
  width:420px;
}

h2{
  margin-top:0;
}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.lang{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.lang button{
  flex:1;
  background:#334155;
}

.result{
  margin-top:15px;
  white-space:pre-line;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
}

canvas{
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<!-- 🌐 idioma -->
<div class="lang">
  <button onclick="setLang('es')">ES</button>
  <button onclick="setLang('en')">EN</button>
</div>

<h2 id="title">💰 RateFinder</h2>

<input id="job" placeholder="job (dev, designer, vet)"/>

<select id="level">
<option value="junior">Junior</option>
<option value="mid">Mid</option>
<option value="senior">Senior</option>
</select>

<input id="country" placeholder="Country (US, CL, CA, EU)"/>

<button onclick="calc()" id="btn">Calcular</button>

<div id="result" class="result"></div>

<canvas id="chart"></canvas>

</div>

<script>

let lang = "es";
let chart;

// 🌐 idioma
function setLang(l){
  lang = l;

  document.getElementById("btn").innerText =
    l === "es" ? "Calcular" : "Calculate";

  document.getElementById("job").placeholder =
    l === "es"
      ? "Trabajo (dev, designer, vet)"
      : "Job (dev, designer, vet)";

  document.getElementById("country").placeholder =
    l === "es"
      ? "País (US, CL, CA, EU)"
      : "Country (US, CL, CA, EU)";
}

// 🚀 calcular
async function calc(){

const job = document.getElementById("job").value.trim().toLowerCase();
const level = document.getElementById("level").value;
const country = document.getElementById("country").value.trim().toUpperCase();

const result = document.getElementById("result");

if(!job || !country){
  result.innerText =
    lang === "es"
      ? "Completa todos los campos"
      : "Fill all fields";
  return;
}

try{

const url =
`https://ratefinder.onrender.com/rate?job=${job}&level=${level}&country=${country}`;

const res = await fetch(url);
const data = await res.json();

// 💡 backend YA entrega datos por país
const min = data.min;
const max = data.max;
const mid = (min + max) / 2;

// 💰 texto
result.innerText =
lang === "es"
? `💰 Rango salarial\n\n${Math.round(min)} - ${Math.round(max)} ${country}\n\n${job} | ${level}`
: `💰 Salary range\n\n${Math.round(min)} - ${Math.round(max)} ${country}\n\n${job} | ${level}`;

// 📊 gráfico
draw(min, mid, max);

}catch(e){
console.log(e);
result.innerText =
lang === "es"
? "Error de servidor"
: "Server error";
}

}

// 📊 gráfico
function draw(min, mid, max){

if(chart) chart.destroy();

const ctx = document.getElementById("chart");

chart = new Chart(ctx, {
type: "bar",
data: {
labels: ["Min", "Mid", "Max"],
datasets: [{
data: [min, mid, max]
}]
},
options: {
plugins: {
legend: { display: false }
}
}
});

}

</script>

</body>
</html>
