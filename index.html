<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RateFinder</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  padding:30px;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:16px;
  width:420px;
}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:8px;
}

.lang{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.lang button{
  flex:1;
  background:#334155;
}

.result{
  margin-top:15px;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  white-space:pre-line;
}

canvas{
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<div class="lang">
<button onclick="setLang('es')">ES</button>
<button onclick="setLang('en')">EN</button>
</div>

<h2>💰 RateFinder</h2>

<input id="job" placeholder="job (dev, vet, designer)"/>

<select id="level">
<option value="junior">Junior</option>
<option value="mid">Mid</option>
<option value="senior">Senior</option>
</select>

<input id="country" placeholder="US, CA, CL, EU"/>

<select id="currency">
<option value="USD">USD</option>
<option value="CLP">CLP</option>
<option value="CAD">CAD</option>
<option value="EUR">EUR</option>
</select>

<button onclick="calc()">Calcular</button>

<div id="result" class="result"></div>

<canvas id="chart"></canvas>

</div>

<script>

let chart;
let lang = "es";

function setLang(l){
  lang = l;
}

async function calc(){

const job=document.getElementById("job").value.trim().toLowerCase();
const level=document.getElementById("level").value;
const country=document.getElementById("country").value.trim().toUpperCase();
const currency=document.getElementById("currency").value;

const result=document.getElementById("result");

if(!job || !country){
  result.innerText = lang==="es"
    ? "Completa todos los campos"
    : "Fill all fields";
  return;
}

try{

const url=`https://ratefinder.onrender.com/rate?job=${job}&level=${level}&country=${country}`;

const res=await fetch(url);
const data=await res.json();

const min=data.min_usd;
const max=data.max_usd;
const mid=(min+max)/2;

// 💱 conversión simple visual
const fx = data.fx[currency];

const minConv = Math.round(min * fx);
const maxConv = Math.round(max * fx);
const midConv = Math.round(mid * fx);

if(lang==="es"){
  result.innerText =
`${job} | ${level} | ${country}

💰 ${minConv} - ${maxConv} ${currency}`;
}else{
  result.innerText =
`${job} | ${level} | ${country}

💰 ${minConv} - ${maxConv} ${currency}`;
}

draw(minConv, midConv, maxConv);

}catch(e){
console.log(e);
result.innerText =
lang==="es" ? "Error de servidor" : "Server error";
}

}

function draw(min, mid, max){

if(chart) chart.destroy();

const ctx=document.getElementById("chart");

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Min","Mid","Max"],
datasets:[{
data:[min, mid, max]
}]
},
options:{
plugins:{legend:{display:false}}
}
});

}

</script>

</body>
</html>
